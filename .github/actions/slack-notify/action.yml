name: Slack Notification
description: "Send CI result to Slack using the official Slack GitHub Action"

inputs:
  status:
    description: "Job status"
    required: true
  webhook_url:
    description: "Slack Webhook URL"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set Status Context
      shell: bash
      run: |
        if [ "${{ inputs.status }}" = "success" ]; then
          echo "COLOR=#36a64f" >> $GITHUB_ENV
          echo "RESULT_TEXT=✅ Success" >> $GITHUB_ENV
        else
          echo "COLOR=#ef5350" >> $GITHUB_ENV
          echo "RESULT_TEXT=❌ Failure" >> $GITHUB_ENV
        fi

    - name: Send Slack Notification
      uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
      with:
        webhook-type: incoming-webhook
        payload: |
          {
            "attachments": [
              {
                "color": "${{ env.COLOR }}",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*CI Result: ${{ env.RESULT_TEXT }}*"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Workflow:*\n${{ github.workflow }}" },
                      { "type": "mrkdwn", "text": "*Repo:*\n${{ github.repository }}" },
                      { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                      { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                    ]
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.webhook_url }}
